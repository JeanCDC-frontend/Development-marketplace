<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuiaLocal</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/hero.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-content">

      <a href="#" class="logo">GuiaLocal</a>

      <!-- SEARCH -->
      <div class="search-bar">
        <input type="text" placeholder="Pesquise empresas, serviços, produtos...">
      </div>

      <!-- AUTH -->
      <div class="auth">
        <button class="btn btn-outline">Entrar</button>
        <button class="btn btn-primary">Cadastrar</button>
      </div>

    </div>
  </header>

  <section class="hero">

  <div class="container">

    <div class="hero-grid">

      <!-- HERO PRINCIPAL -->
      <div class="hero-main">

        <div class="hero-content">
          <span class="hero-badge">Anúncio em Destaque</span>

          <h1>Encontre seu Imóvel Ideal</h1>

          <p>Milhares de opções na sua região</p>

          <button class="btn btn-primary">Saiba mais</button>
        </div>

      </div>


      <!-- CARDS LATERAIS -->
      <div class="hero-side">

        <div class="hero-card">
          <span>Restaurante</span>
          <h3>Restaurante Bela Vista</h3>
        </div>

        <div class="hero-card">
          <span>Imóveis</span>
          <h3>Torres Imóveis Premium</h3>
        </div>

      </div>

    </div>

  </div>

</section>

  <script src="js/main.js"></script>
</body>
</html>
