<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/main.css">
    
</head>
<body>
    
    <header class="header" id="header">
        
        <div class="container">

            <div class="logo">
                <img src="../assets/images/logoSyfer.png" alt="syfer">
            </div>

            <!-- BOTÃO MOBILE -->
            <button class="menu-toggle" id="menu-toggle">
                ☰
            </button>

            <nav class="nav" id="nav">
                <a href="#" class="nav-link">Início</a>
                <a href="#" class="nav-link">Serviços de TI</a>
                <a href="#" class="nav-link">Desenvolvimento</a>
                <a href="#" class="nav-link">Serviços Digitais</a>
                <a href="#" class="nav-link">Contatos</a>
            </nav>

            <div class="actions">
                <button class="btn-primary">Entrar</button>
                <button class="btn-secondary">Cadastro</button>
            </div>
         </div>
         
    </header>

    <section class="hero">
        <!-- Imagem -->
        <img src="../assets/images/hero-image.png" alt="Desenvolvedor programando" class="hero__img">

        <!-- Overlay -->
        <div class="hero__overlay"></div>

        <!-- Conteúdo -->
        <div class="hero__content">
            <h1 class="hero__title">
            Transformamos Empresas com Tecnologia
            </h1>

            <p class="hero__subtitle">
            Desenvolvimento de sites e soluções digitais sob medida
            </p>

            <div class="hero__actions">
            <button class="btn-primary">Fale Conosco</button>
            <button class="btn-secondary">Entrar em contato</button>
            </div>
        </div>

        <!-- A seção que divide hero e conteúdo -->
        <div class="wave-wrapper">
            <svg class="wave wave--1" viewBox="0 0 1440 80" preserveAspectRatio="none">
                <path class="wave__path" d="M0,40 C180,80 360,0 540,40 ..."/>
            </svg>
            <svg class="wave wave--2" viewBox="0 0 1440 80" preserveAspectRatio="none">
                <path class="wave__path" d="M0,20 C240,60 480,0 720,30 ..."/>
            </svg>
            <svg class="wave wave--3" viewBox="0 0 1440 80" preserveAspectRatio="none">
                <path class="wave__path" d="M0,30 C120,10 360,60 600,30 ..."/>
            </svg>
        </div>
    </section>





    
    <script src="../scripts/menu.js"></script>
</body>
</html>
